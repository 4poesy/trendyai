version: '3.8'

services:
  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    container_name: trendyai-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/London
    volumes:
      - trendyai_n8n_data:/home/node/.n8n

  # PostgreSQL Database (for Activepieces local database)
  postgres:
    image: postgres:15-alpine
    container_name: trendyai-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=activepieces
      - POSTGRES_USER=activepieces
      - POSTGRES_PASSWORD=activepieces123 # Safe default password for local docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Map to 5433 to avoid conflict with any local postgres on 5432

  # Redis (Queueing and Agent State)
  redis:
    image: redis:alpine
    container_name: trendyai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Activepieces (n8n Alternative / Trigger automation)
  activepieces:
    image: activepieces/activepieces:latest
    container_name: trendyai-activepieces
    ports:
      - "8080:80"
    environment:
      - AP_ENCRYPTION_KEY=e13a968631ff2ef5b1e604f8db7b3f8a
      - AP_JWT_SECRET=66a2b8e3bf5d4e1cb8d3b74df1cfc672
      - AP_FRONTEND_URL=http://localhost:8080
      - AP_POSTGRES_HOST=postgres
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_DATABASE=activepieces
      - AP_POSTGRES_USERNAME=activepieces
      - AP_POSTGRES_PASSWORD=activepieces123
      - AP_REDIS_HOST=redis
      - AP_REDIS_PORT=6379
      - AP_SANDBOX_RUN_EFFECTS_ONLY=true
    volumes:
      - activepieces_data:/root/.activepieces
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  # Flowise (Visual Agentflow / 25 AI Agent personas)
  flowise:
    image: flowiseai/flowise:latest
    container_name: trendyai-flowise
    ports:
      - "3002:3001"
    environment:
      - PORT=3001
      - FLOWISE_USERNAME=admin
      - FLOWISE_PASSWORD=admin123
      - DATABASE_TYPE=sqlite
    volumes:
      - flowise_data:/root/.flowise
    restart: unless-stopped

volumes:
  trendyai_n8n_data:
    name: trendyai_n8n_data
  postgres_data:
    name: trendyai_postgres_data
  activepieces_data:
    name: trendyai_activepieces_data
  flowise_data:
    name: trendyai_flowise_data
  redis_data:
    name: trendyai_redis_data
